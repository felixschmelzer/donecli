version: 2
project_name: ding

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}
    flags:
      - -trimpath

archives:
  - id: binary
    formats: [binary]
    name_template: "ding-{{ .Os }}-{{ .Arch }}"
  - id: tarball
    formats: [tar.gz]
    name_template: "ding-{{ .Os }}-{{ .Arch }}"

homebrew_casks:
  - name: ding
    ids: [tarball]
    binaries: ["ding"]
    repository:
      owner: felixschmelzer
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/felixschmelzer/ding"
    description: "Run any shell command and get a Telegram notification when it finishes."
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/ding"]
          end

checksum:
  name_template: checksums.txt

changelog:
  use: github
